# coturn config for local development (M0).
# Dev-only: long-term credentials, no TLS (certs are added for production in M8/M9).

listening-port=3478
fingerprint
lt-cred-mech

# Static dev credentials — MUST match TURN_USER / TURN_PASSWORD in .env.
# Operators replace these (ideally with short-lived REST/HMAC credentials) in production.
user=hearth:hearth_dev_password
realm=hearth.local

# Relay port range — keep in sync with the mapped range in docker-compose.yml.
min-port=50000
max-port=50050

# No TLS/DTLS in dev (no certs); enable in production.
no-tls
no-dtls

no-cli
no-multicast-peers
