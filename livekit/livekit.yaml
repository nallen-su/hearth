# LiveKit server config for local development (M0).
# Production deployments override keys and enable TURN/TLS + external IP (M8/M9).
port: 7880

rtc:
  tcp_port: 7881
  # Single UDP mux port keeps local port mapping simple (vs. a large UDP range).
  udp_port: 7882
  # Inside Docker, LiveKit would otherwise advertise the container's internal IP
  # (172.x) as its ICE candidate — unreachable from the host browser, which shows up
  # as "negotiation timed out". Pin the advertised IP to localhost so media reaches the
  # mapped host ports. node_ip overrides use_external_ip.
  #   - Same-machine dev (two tabs/browsers): 127.0.0.1 (below).
  #   - Testing from another device on your LAN: set this to your Mac's LAN IP.
  #   - Production: remove node_ip and set use_external_ip: true.
  node_ip: 127.0.0.1
  use_external_ip: false

# API key/secret pairs. MUST match LIVEKIT_API_KEY / LIVEKIT_API_SECRET in .env.
# Dev-only credentials — operators must replace these. Secret must be >= 32 chars.
keys:
  devkey: devsecret_change_me_at_least_32_characters

logging:
  level: info
