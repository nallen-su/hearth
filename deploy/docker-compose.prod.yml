# Single-box production topology (reference — adapt to your host).
# Run from the repo root:  docker compose -f deploy/docker-compose.prod.yml up -d --build
#
# Provide secrets via a real .env (never commit it). This mirrors the dev services but
# adds the app image and a Caddy TLS reverse proxy, and does NOT expose Postgres to the
# host. See DEPLOY.md for the full runbook (DNS, firewall, LiveKit media/TURN).
name: hearth-prod

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16.3-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:v1.13.1
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    # Prod livekit.yaml must set use_external_ip: true + real keys, and configure TURN.
    volumes:
      - ../livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7881:7881" # ICE/TCP
      - "7882:7882/udp" # ICE/UDP mux
    network_mode: host

  coturn:
    image: coturn/coturn:4.6.2-alpine
    restart: unless-stopped
    # TURN needs host networking + a public IP + open 3478/5349 and the relay range.
    network_mode: host
    volumes:
      - ../coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
